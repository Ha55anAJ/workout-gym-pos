<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Demo Gym — Management System</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#185fa5" />
<link rel="icon" href="/icon-192.png" />

<style>
  /* Self-hosted Inter (weights 400/500/600/700) */
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/inter-400.woff2') format('woff2'); }
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 500; font-display: swap; src: url('/fonts/inter-500.woff2') format('woff2'); }
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/inter-600.woff2') format('woff2'); }
  @font-face { font-family: 'Inter'; font-style: normal; font-weight: 700; font-display: swap; src: url('/fonts/inter-700.woff2') format('woff2'); }
  html, body { height: 100%; }
  body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #111827; background: #f3f4f6; font-size: 14px; -webkit-font-smoothing: antialiased; }
  table.dense td, table.dense th { font-size: 13px; }
  .nav-item { transition: background .12s ease, color .12s ease; }
  .row-hover:hover { background: #f9fafb; }
  .slideover-panel { transition: transform .28s cubic-bezier(.4,0,.2,1); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; background-clip: padding-box; }
  thead.sticky th { position: sticky; top: 0; z-index: 5; }
  input:focus, select:focus, textarea:focus, button:focus-visible { outline: 2px solid #185fa5; outline-offset: 1px; }
  .scan-pulse { animation: scanpulse 1.6s ease-in-out infinite; }
  @keyframes scanpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(24,95,165,.20); } 50% { box-shadow: 0 0 0 16px rgba(24,95,165,0); } }
  .flash-ok { animation: flashok .6s ease; } @keyframes flashok { 0% { background:#dcfce7; } 100% { background:#fff; } }
  .flash-bad { animation: flashbad .6s ease; } @keyframes flashbad { 0% { background:#fee2e2; } 100% { background:#fff; } }
  #print-area { display: none; }
  @media print { body * { visibility: hidden !important; } #print-area, #print-area * { visibility: visible !important; } #print-area { display:block !important; position:absolute; left:0; top:0; width:100%; } .no-print { display:none !important; } }
</style>
</head>
<body class="text-ink">
  <div id="app" class="flex h-screen overflow-hidden">
    <div class="m-auto text-center text-sub"><div class="text-sm">Loading Demo Gym…</div></div>
  </div>

  <!-- Login gate: shown when there is no valid token. Same visual language as the app. -->
  <div id="login" class="fixed inset-0 z-[70] hidden items-center justify-center bg-panel p-6">
    <div class="w-full max-w-sm rounded-2xl border border-line bg-white p-7 shadow-sm">
      <div class="flex items-center gap-2.5">
        <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-accent text-white font-bold">D</span>
        <div class="leading-tight"><div class="text-[16px] font-semibold">Demo Gym</div><div class="text-[11px] text-sub">Owner dashboard</div></div>
      </div>
      <h1 class="mt-6 text-lg font-semibold">Sign in</h1>
      <p class="mt-1 text-[13px] text-sub">Use your owner account to access analytics and controls.</p>
      <form id="login-form" onsubmit="return doLogin(event)" class="mt-5 space-y-4">
        <div><div class="text-[12px] font-medium text-sub mb-1">Username</div><input id="login-user" autocomplete="username" class="w-full rounded-lg border border-line px-3 py-2 text-sm" placeholder="owner" /></div>
        <div><div class="text-[12px] font-medium text-sub mb-1">Password</div><input id="login-pass" type="password" autocomplete="current-password" class="w-full rounded-lg border border-line px-3 py-2 text-sm" placeholder="••••••••" /></div>
        <div id="login-error" class="hidden text-[13px] text-red-600"></div>
        <button type="submit" id="login-btn" class="w-full rounded-lg bg-accent px-4 py-2.5 text-sm font-medium text-white hover:bg-accent-hover">Sign in</button>
      </form>
    </div>
  </div>

  <div id="slideover" class="fixed inset-0 z-40 hidden">
    <div class="absolute inset-0 bg-black/30" onclick="closeSlide()"></div>
    <div id="slideover-panel" class="slideover-panel absolute right-0 top-0 h-full w-full max-w-[640px] translate-x-full bg-white shadow-2xl flex flex-col"></div>
  </div>
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-6">
    <div class="absolute inset-0 bg-black/40" onclick="closeModal()"></div>
    <div id="modal-card" class="relative z-10 max-h-[90vh] overflow-auto"></div>
  </div>
  <div id="toast" class="fixed bottom-6 right-6 z-[60] hidden">
    <div class="flex items-center gap-2 rounded-lg bg-ink px-4 py-3 text-sm text-white shadow-lg">
      <i data-lucide="check-circle-2" class="h-4 w-4 text-green-400"></i><span id="toast-msg">Done</span>
    </div>
  </div>
  <div id="print-area"></div>

<script>
/* ============================================================================
   DEMO GYM — frontend. Same UI as the approved demo, now backed by the local
   server (Express + SQLite) and the ZK9500 fingerprint service.
   Data is loaded from /api/bootstrap; every change is persisted via the API.
   ========================================================================== */

/* ---- runtime config (filled by bootstrap) ---- */
let GYM = {}, TIERS = {}, POLICY = { cycleDays: 30, dueSoonDays: 5 };
let TODAY = new Date();
let VERSION = '1.0.0';
let fpStatus = { mode: 'simulation', device: '', samplesRequired: 3 };
let ENROLL_SAMPLES = 3;

let members = [], payments = [], expenses = [], staff = [], users = [], checkins = [], staffCheckins = [];
let LOGO = null;

const TIER_NAMES = ['Basic', 'Premium', 'Student', 'Family'];
const METHODS = ['Cash', 'Card', 'Easypaisa', 'JazzCash'];

/* ---- small date / format helpers ---- */
const DAY = 86400000;
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const pad = (n) => String(n).padStart(2, '0');
const addDays = (d, n) => new Date(d.getTime() + n * DAY);
const stripTime = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate());
const daysBetween = (a, b) => Math.round((stripTime(b) - stripTime(a)) / DAY);
function fmtDate(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
function fmtDateLong(d) { return d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear(); }
function fmtMonth(d) { return MONTHS[d.getMonth()] + ' ' + d.getFullYear(); }
function fmtTime(d) { let h = d.getHours(), m = d.getMinutes(); const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return h + ':' + pad(m) + ' ' + ap; }
function pkr(n) { return 'PKR ' + Math.round(n).toLocaleString('en-US'); }
function monthKey(d) { return d.getFullYear() * 12 + d.getMonth(); }
function initials(name) { const p = name.trim().split(/\s+/); return ((p[0]?.[0] || '') + (p[1]?.[0] || p[0]?.[1] || '')).toUpperCase(); }
function avatarColor(seed) {
  const c = ['#185fa5','#0f766e','#7c3aed','#b45309','#be123c','#1d4ed8','#15803d','#a16207','#9333ea','#0e7490'];
  let h = 0; for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) | 0; return c[Math.abs(h) % c.length];
}
function dOnly(s) { if (!s) return null; const p = String(s).slice(0, 10).split('-').map(Number); return new Date(p[0], p[1] - 1, p[2], 12, 0, 0); }
function dTime(s) { return s ? new Date(s) : null; }

/* ---- derived ---- */
function statusOf(m) {
  if (!m.lastPayment) return 'Not enrolled';
  if (m.suspended) return 'Suspended';
  const due = addDays(m.lastPayment, POLICY.cycleDays);
  const dleft = daysBetween(TODAY, due);
  if (dleft < 0) return 'Overdue';
  if (dleft <= POLICY.dueSoonDays) return 'Due soon';
  return 'Paid';
}
function dueDateOf(m) { return m.lastPayment ? addDays(m.lastPayment, POLICY.cycleDays) : null; }
function daysOverdue(m) { const due = dueDateOf(m); return due ? Math.max(0, daysBetween(due, TODAY)) : 0; }

const STATUS_STYLE = { 'Paid':'bg-green-100 text-green-800','Due soon':'bg-amber-100 text-amber-800','Overdue':'bg-red-100 text-red-700','Not enrolled':'bg-gray-100 text-gray-600','Suspended':'bg-gray-200 text-gray-700' };
function pill(s) { return '<span class="inline-flex items-center rounded-full px-2 py-0.5 text-[11px] font-semibold uppercase tracking-wide ' + (STATUS_STYLE[s] || 'bg-gray-100 text-gray-600') + '">' + s + '</span>'; }
const CAT_STYLE = { 'Rent':'bg-indigo-50 text-indigo-700','Salaries':'bg-blue-50 text-blue-700','Utilities':'bg-cyan-50 text-cyan-700','Equipment':'bg-violet-50 text-violet-700','Supplies':'bg-teal-50 text-teal-700','Marketing':'bg-amber-50 text-amber-700','Maintenance':'bg-orange-50 text-orange-700','Other':'bg-gray-100 text-gray-600' };
function catTag(c) { return '<span class="inline-flex items-center rounded px-2 py-0.5 text-[11px] font-medium ' + (CAT_STYLE[c] || 'bg-gray-100 text-gray-600') + '">' + c + '</span>'; }
function avatar(name, size) { size = size || 28; const fs = Math.round(size * 0.4); return '<span class="inline-flex shrink-0 items-center justify-center rounded-full font-semibold text-white" style="width:' + size + 'px;height:' + size + 'px;font-size:' + fs + 'px;background:' + avatarColor(name) + '">' + initials(name) + '</span>'; }

function collectedToday() { return payments.filter(p => daysBetween(p.date, TODAY) === 0).reduce((t, p) => t + p.amount, 0); }
function checkinsOn(d) { return checkins.filter(c => daysBetween(c.at, d) === 0).length; }
function activeMemberCount() { return members.filter(m => !m.suspended && m.lastPayment).length; }
function joinedThisMonth() { return members.filter(m => m.joinDate.getMonth() === TODAY.getMonth() && m.joinDate.getFullYear() === TODAY.getFullYear()).length; }
function outstandingTotal() {
  return members.reduce((t, m) => { const s = statusOf(m);
    if (s === 'Overdue') return t + TIERS[m.type] * Math.min(6, Math.ceil(daysOverdue(m) / 30));
    if (s === 'Due soon') return t + TIERS[m.type]; return t; }, 0);
}
function memberSpend(id) { return payments.filter(p => p.memberId === id).reduce((t, p) => t + p.amount, 0); }
function memberVisits(id, days) { const since = addDays(TODAY, -days); return checkins.filter(c => c.memberId === id && c.at >= since).length; }
function addMonths(d, n) { return new Date(d.getFullYear(), d.getMonth() + n, d.getDate(), 12, 0, 0); }
function paidOnOrAfter(id, date) { const t = stripTime(date).getTime(); return payments.some(p => p.memberId === id && stripTime(p.date).getTime() >= t); }
function monthlySeries(n) {
  const out = [];
  for (let i = n - 1; i >= 0; i--) {
    const base = new Date(TODAY.getFullYear(), TODAY.getMonth() - i, 1); const key = monthKey(base);
    const rev = payments.filter(p => monthKey(p.date) === key).reduce((t, p) => t + p.amount, 0);
    const exp = expenses.filter(e => monthKey(e.date) === key).reduce((t, e) => t + e.amount, 0);
    const paidCount = new Set(payments.filter(p => monthKey(p.date) === key).map(p => p.memberId)).size;
    const payCount = payments.filter(p => monthKey(p.date) === key).length;
    out.push({ label: MONTHS[base.getMonth()] + ' ' + String(base.getFullYear()).slice(2), date: base, rev, exp, paidCount, payCount });
  }
  return out;
}
function dailyCheckinSeries(n) { const out = []; for (let i = n - 1; i >= 0; i--) { const d = addDays(TODAY, -i); out.push({ d, count: checkinsOn(d) }); } return out; }
function dailyCollectionSeries(n) {
  const out = [];
  for (let i = n - 1; i >= 0; i--) { const d = addDays(TODAY, -i); const bm = {}; METHODS.forEach(m => bm[m] = 0);
    payments.filter(p => daysBetween(p.date, d) === 0).forEach(p => bm[p.method] += p.amount);
    out.push({ d, byMethod: bm, total: Object.values(bm).reduce((a, b) => a + b, 0) }); }
  return out;
}

/* ---- auth / token ---- */
const TOKEN_KEY = 'demoGymToken', ACCOUNT_KEY = 'demoGymAccount';
function getToken() { try { return localStorage.getItem(TOKEN_KEY); } catch (e) { return null; } }
function setToken(t) { try { t ? localStorage.setItem(TOKEN_KEY, t) : localStorage.removeItem(TOKEN_KEY); } catch (e) {} }
function getAccount() { try { return JSON.parse(localStorage.getItem(ACCOUNT_KEY) || 'null'); } catch (e) { return null; } }
function setAccount(a) { try { a ? localStorage.setItem(ACCOUNT_KEY, JSON.stringify(a)) : localStorage.removeItem(ACCOUNT_KEY); } catch (e) {} }

/* ---- API helper (JWT bearer; 401 → re-login) ---- */
async function api(path, opts) {
  opts = opts || {};
  const o = { method: opts.method || 'GET', headers: {} };
  const tok = getToken();
  if (tok) o.headers['Authorization'] = 'Bearer ' + tok;
  if (opts.body !== undefined) { o.headers['Content-Type'] = 'application/json'; o.body = JSON.stringify(opts.body); }
  const r = await fetch('/api' + path, o);
  if (r.status === 401) { setToken(null); setAccount(null); showLogin(); throw new Error('Session expired — please sign in again.'); }
  const ct = r.headers.get('content-type') || '';
  const data = ct.includes('application/json') ? await r.json() : await r.text();
  if (!r.ok) throw new Error((data && data.error) || ('HTTP ' + r.status));
  return data;
}

/* ---- cloud command queue: owner writes are enqueued, the laptop applies + syncs back ---- */
async function cloudCmd(type, payload, msg) {
  await api('/commands', { method: 'POST', body: { type, payload } });
  toast(msg || 'Queued — will apply on the gym laptop shortly');
  if (typeof closeSlide === 'function') closeSlide();
  if (typeof closeModal === 'function') closeModal();
  setTimeout(refreshAll, 1500);
}
async function refreshAll() {
  try { await loadBootstrap(); render(); } catch (e) { /* api() already handles 401 */ }
}
function reviveMember(m) { m.joinDate = dOnly(m.joinDate); m.lastPayment = dOnly(m.lastPayment); m.fingerprintEnrolledAt = dOnly(m.fingerprintEnrolledAt); return m; }
function revivePayment(p) { p.date = dOnly(p.date); return p; }
function reviveExpense(e) { e.date = dOnly(e.date); return e; }
function reviveCheckin(c) { c.at = dTime(c.at); return c; }

async function loadBootstrap() {
  const b = await api('/bootstrap');
  GYM = b.settings.gym; TIERS = b.settings.tiers; POLICY = b.settings.policy; VERSION = b.settings.version;
  LOGO = b.settings.logo || null;
  TODAY = dOnly(b.today);
  fpStatus = b.fingerprint; ENROLL_SAMPLES = fpStatus.samplesRequired || 3;
  members = b.members.map(reviveMember);
  payments = b.payments.map(revivePayment);
  expenses = b.expenses.map(reviveExpense);
  staff = b.staff;
  users = b.users || [];
  checkins = b.checkins.map(reviveCheckin);
  staffCheckins = (b.staffCheckins || []).map((c) => { c.at = dTime(c.at); return c; });
  const acct = getAccount();
  state.role = (acct && acct.role) || 'Owner';
  if (!canSee(state.page)) state.page = 'dashboard';
  document.title = (GYM.name || 'Demo Gym') + ' — Management System';
}

/* ---- state + nav ---- */
const state = { role: 'Owner', page: 'dashboard', userMenuOpen: false, memberSearch: '', memberFilter: 'All', payMethod: 'All', paySearch: '', payFrom: '', payTo: '', expCat: 'All', expFrom: '', expTo: '', lastBackup: null };
const ROLE_USER = { Owner: 'Owner', Receptionist: 'Receptionist' };
// Owner analytics/business views only. Scan removed (no fingerprint reader in the cloud).
const NAV = [
  { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard', roles: ['Owner', 'Receptionist'] },
  { id: 'members', label: 'Members', icon: 'users', roles: ['Owner', 'Receptionist'] },
  { id: 'payments', label: 'Payments', icon: 'wallet', roles: ['Owner', 'Receptionist'] },
  { id: 'expenses', label: 'Expenses', icon: 'receipt', roles: ['Owner'] },
  { id: 'reports', label: 'Reports', icon: 'bar-chart-3', roles: ['Owner'] },
  { id: 'staff', label: 'Staff', icon: 'id-card', roles: ['Owner'] },
  { id: 'settings', label: 'Settings', icon: 'settings', roles: ['Owner'] }
];
function canSee(p) { const n = NAV.find(x => x.id === p); return n && n.roles.includes(state.role); }
const PAGES = {};
function go(p) { if (!canSee(p)) p = 'dashboard'; state.page = p; state.userMenuOpen = false; render(); }
function toggleUserMenu() { state.userMenuOpen = !state.userMenuOpen; render(); }

/* ---- render root ---- */
function render() {
  const nav = NAV.filter(n => n.roles.includes(state.role));
  const pageTitle = (NAV.find(n => n.id === state.page) || {}).label || '';
  const sidebar = `
    <nav class="flex w-[240px] shrink-0 flex-col border-r border-line bg-white">
      <div class="flex items-center gap-2.5 px-5 h-16 border-b border-line">
        ${LOGO ? `<img src="${LOGO}" class="h-8 w-8 rounded-lg object-cover" alt="logo" />` : `<span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-accent text-white font-bold">${(GYM.name || 'D').trim().charAt(0).toUpperCase()}</span>`}
        <div class="leading-tight"><div class="text-[15px] font-semibold">${GYM.name || 'Demo Gym'}</div><div class="text-[11px] text-sub">${GYM.city || ''}</div></div>
      </div>
      <div class="flex-1 overflow-y-auto p-3 space-y-0.5">
        ${nav.map(n => `<button onclick="go('${n.id}')" class="nav-item flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium ${state.page === n.id ? 'bg-accent-soft text-accent' : 'text-gray-700 hover:bg-gray-100'}"><i data-lucide="${n.icon}" class="h-[18px] w-[18px]"></i>${n.label}</button>`).join('')}
      </div>
      <div class="border-t border-line p-3 text-[11px] text-sub">
        <div class="flex items-center gap-1.5"><i data-lucide="cloud" class="h-3.5 w-3.5 text-accent"></i> Cloud dashboard</div>
        <div class="mt-1">Synced from the gym laptop</div>
      </div>
    </nav>`;
  const acct = getAccount() || {};
  const acctName = acct.name || acct.username || state.role;
  const header = `
    <header class="flex h-16 shrink-0 items-center justify-between border-b border-line bg-white px-6">
      <div><h1 class="text-lg font-semibold leading-none">${pageTitle}</h1><p class="mt-1 text-[12px] text-sub">${fmtDateLong(TODAY)}</p></div>
      <div class="relative">
        <button onclick="toggleUserMenu()" class="flex items-center gap-2.5 rounded-lg border border-line px-2.5 py-1.5 text-sm hover:bg-gray-50">
          ${avatar(acctName, 28)}
          <span class="text-left leading-tight"><span class="block text-[12px] text-sub">Signed in as</span><span class="block font-medium">${acctName}</span></span>
          <i data-lucide="chevron-down" class="h-4 w-4 text-sub"></i>
        </button>
        ${state.userMenuOpen ? `<div class="absolute right-0 mt-1 w-60 rounded-lg border border-line bg-white p-1.5 shadow-lg z-20">
          <div class="flex items-center gap-2 px-2 py-2"><span class="flex items-center gap-2">${avatar(acctName, 24)} <span class="leading-tight"><span class="block font-medium text-sm">${acctName}</span><span class="block text-[11px] text-sub">${acct.role || state.role}</span></span></span></div>
          <div class="my-1 border-t border-line"></div>
          <button onclick="logout()" class="flex w-full items-center gap-2 rounded-md px-2 py-2 text-sm hover:bg-gray-100"><i data-lucide="log-out" class="h-4 w-4 text-sub"></i><span class="font-medium">Logout</span></button>
        </div>` : ''}
      </div>
    </header>`;
  document.getElementById('app').innerHTML = `${sidebar}<main class="flex flex-1 flex-col overflow-hidden">${header}<div id="page" class="flex-1 overflow-y-auto bg-panel p-6"></div></main>`;
  const page = PAGES[state.page] || PAGES.dashboard;
  document.getElementById('page').innerHTML = page.render();
  if (typeof page.mount === 'function') page.mount();
  if (window.lucide) lucide.createIcons();
}
function kpiCard(label, value, sub, subColor) { return `<div class="rounded-xl border border-line bg-white p-5"><div class="text-[12px] font-medium text-sub">${label}</div><div class="mt-2 text-[26px] font-semibold leading-none">${value}</div>${sub ? `<div class="mt-2 text-[12px] font-medium ${subColor || 'text-sub'}">${sub}</div>` : ''}</div>`; }
function emptyState(icon, text) { return `<div class="flex flex-col items-center justify-center py-12 text-center text-sub"><i data-lucide="${icon}" class="h-8 w-8 mb-2 opacity-50"></i><div class="text-sm">${text}</div></div>`; }
function card(title, body, action) { return `<section class="rounded-xl border border-line bg-white"><div class="flex items-center justify-between border-b border-line px-5 py-3"><h2 class="text-sm font-semibold">${title}</h2>${action || ''}</div><div class="p-5">${body}</div></section>`; }

/* ============================ PAGES ============================ */
/* ---- Dashboard ---- */
PAGES.dashboard = {
  render() {
    const owner = state.role === 'Owner';
    const kpis = [
      kpiCard('Members active', activeMemberCount(), '+' + joinedThisMonth() + ' this month', 'text-green-600'),
      kpiCard("Today's check-ins", checkinsOn(TODAY), 'Updated live', 'text-sub')
    ];
    if (owner) {
      kpis.push(kpiCard('Collected today', pkr(collectedToday()), 'Across all methods', 'text-sub'));
      kpis.push(kpiCard('Outstanding fees', pkr(outstandingTotal()), members.filter(m => statusOf(m) === 'Overdue').length + ' members overdue', 'text-red-600'));
    }
    const recent = checkins.slice(0, 8).map(c => { const m = members.find(x => x.id === c.memberId);
      return `<tr class="row-hover border-b border-line last:border-0"><td class="py-2.5 pr-3 text-sub whitespace-nowrap">${fmtTime(c.at)}</td><td class="py-2.5 pr-3"><span class="flex items-center gap-2">${avatar(c.memberName, 24)}<span class="font-medium">${c.memberName}</span></span></td><td class="py-2.5 text-right">${pill(m ? statusOf(m) : 'Paid')}</td></tr>`; }).join('');
    const overdue = members.filter(m => statusOf(m) === 'Overdue').sort((a, b) => daysOverdue(b) - daysOverdue(a)).slice(0, 8)

    <div><div class="text-[12px] font-medium text-sub mb-1">Phone</div><input id="am-phone" class="w-full rounded-lg border border-line px-3 py-2 text-sm" placeholder="+92 3xx xxxxxxx" /></div>
    <div><div class="text-[12px] font-medium text-sub mb-1">Membership type</div><select id="am-type" class="w-full rounded-lg border border-line px-3 py-2 text-sm">${TIER_NAMES.map(t => `<option>${t}</option>`).join('')}</select></div>
    <div class="rounded-lg border border-line bg-panel p-3 text-[12px] text-sub leading-relaxed">Fingerprint enrollment happens on the gym laptop after the member is created.</div>
    <div class="flex gap-2 pt-2"><button onclick="submitMember()" class="rounded-lg bg-accent px-4 py-2 text-sm font-medium text-white hover:bg-accent-hover">Add member</button><button onclick="closeSlide()" class="rounded-lg border border-line px-4 py-2 text-sm font-medium hover:bg-gray-50">Cancel</button></div>
  </div>`);
}
async function submitMember() {
  const name = (document.getElementById('am-name').value || '').trim(); if (!name) { toast('Enter a member name'); return; }
  const phone = document.getElementById('am-phone').value, type = document.getElementById('am-type').value;
  try { await cloudCmd('addMember', { name, phone, type }, name + ' queued — will be created on the gym laptop shortly'); } catch (e) { toast(e.message); }
}
function openEditMember(id) {
  const m = members.find(x => x.id === id); if (!m) return;
  openSlide('Edit member', `<div class="space-y-4 max-w-md">
    <div><div class="text-[12px] font-medium text-sub mb-1">Full name</div><input id="em-name" value="${m.name}" class="w-full rounded-lg border border-line px-3 py-2 text-sm" /></div>
    <div><div class="text-[12px] font-medium text-sub mb-1">Phone</div><input id="em-phone" value="${m.phone}" class="w-full rounded-lg border border-line px-3 py-2 text-sm" /></div>
    <div><div class="text-[12px] font-medium text-sub mb-1">Membership type</div><select id="em-type" class="w-full rounded-lg border border-line px-3 py-2 text-sm">${TIER_NAMES.map(t => `<option ${m.type === t ? 'selected' : ''}>${t}</option>`).join('')}</select></div>
    <div class="flex gap-2 pt-2"><button onclick="submitEditMember('${m.id}')" class="rounded-lg bg-accent px-4 py-2 text-sm font-medium text-white hover:bg-accent-hover">Save changes</button><button onclick="openMember('${m.id}')" class="rounded-lg border border-line px-4 py-2 text-sm font-medium hover:bg-gray-50">Cancel</button></div>
  </div>`);
}
async function submitEditMember(id) {
  const name = document.getElementById('em-name').value, phone = document.getElementById('em-phone').value, type = document.getElementById('em-type').value;
  try { await cloudCmd('editMember', { code: id, name, phone, type }, 'Member changes queued — apply on the gym laptop shortly'); } catch (e) { toast(e.message); }
}

/* ---- receipt ---- */
function printReceipt(payId) {
  const p = payments.find(x => x.id === payId); if (!p) return;
  const receipt = `<div style="width:300px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;font-family:Inter,system-ui,sans-serif">
    <div style="background:#185fa5;color:#fff;padding:16px 18px"><div style="font-size:16px;font-weight:700">${GYM.name}</div><div style="font-size:11px;opacity:.9">${GYM.address}, ${GYM.city}</div><div style="font-size:11px;opacity:.9">${GYM.phone}</div></div>
    <div style="padding:18px"><div style="text-align:center;font-size:12px;letter-spacing:.08em;color:#6b7280;text-transform:uppercase;margin-bottom:12px">Payment receipt</div>
      <table style="width:100%;font-size:13px;border-collapse:collapse">
        <tr><td style="color:#6b7280;padding:4px 0">Receipt no.</td><td style="text-align:right;font-weight:600">${p.id}</td></tr>
        <tr><td style="color:#6b7280;padding:4px 0">Date</td><td style="text-align:right">${fmtDateLong(p.date)}</td></tr>
        <tr><td style="color:#6b7280;padding:4px 0">Member</td><td style="text-align:right">${p.memberName} (${p.memberId})</td></tr>
        <tr><td style="color:#6b7280;padding:4px 0">Membership month</td><td style="text-align:right">${p.month}</td></tr>
        <tr><td style="color:#6b7280;padding:4px 0">Method</td><td style="text-align:right">${p.method}</td></tr>
        <tr><td style="color:#6b7280;padding:4px 0">Received by</td><td style="text-align:right">${p.recordedBy}</td></tr>
      </table>
      <div style="border-top:1px dashed #d1d5db;margin:12px 0"></div>
      <table style="width:100%;font-size:15px"><tr><td style="font-weight:700">Total paid</td><td style="text-align:right;font-weight:700;color:#185fa5">${pkr(p.amount)}</td></tr></table>
      <div style="margin-top:28px;border-top:1px solid #111;width:140px;padding-top:4px;font-size:11px;color:#6b7280">Authorised signature</div>
      <div style="margin-top:14px;text-align:center;font-size:11px;color:#9ca3af">Thank you for training with ${GYM.name}</div>
    </div></div>`;
  openModal(`<div class="rounded-xl bg-white p-4 shadow-2xl">${receipt}<div class="no-print mt-4 flex justify-end gap-2"><button onclick="closeModal()" class="rounded-lg border border-line px-4 py-2 text-sm font-medium hover:bg-gray-50">Close</button><button onclick="doPrint()" class="rounded-lg bg-accent px-4 py-2 text-sm font-medium text-white hover:bg-accent-hover">Print</button></div></div>`);
  document.getElementById('print-area').innerHTML = `<div style="display:flex;justify-content:center;padding-top:40px">${receipt}</div>`;
}
function doPrint() { window.print(); }

/* ---- charts ---- */
const _charts = {};
function chart(id, cfg) { const el = document.getElementById(id); if (!el) return; if (_charts[id]) _charts[id].destroy(); _charts[id] = new Chart(el.getContext('2d'), cfg); }
function baseScales(stacked) { return { x: { stacked: !!stacked, grid: { display: false }, ticks: { color: '#6b7280', font: { size: 11 }, maxRotation: 0, autoSkip: true } }, y: { stacked: !!stacked, beginAtZero: true, grid: { color: '#f0f1f3' }, ticks: { color: '#6b7280', font: { size: 11 }, callback: v => v >= 1000 ? (v / 1000) + 'k' : v } } }; }
function legendTop(show) { return { display: !!show, position: 'top', align: 'end', labels: { boxWidth: 10, boxHeight: 10, usePointStyle: true, font: { size: 11 }, color: '#374151' } }; }
function tip() { return { backgroundColor: '#111827', padding: 10, cornerRadius: 8, titleFont: { size: 12 }, bodyFont: { size: 12 }, callbacks: { label: c => { const v = c.parsed.y; return c.dataset.label + ': ' + (v >= 1000 ? pkr(v) : v); } } }; }
function lineOpts(legend) { return { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { legend: legendTop(legend), tooltip: tip() }, scales: baseScales(false) }; }
function barOpts(legend, stacked) { return { responsive: true, maintainAspectRatio: false, plugins: { legend: legendTop(legend), tooltip: tip() }, scales: baseScales(stacked) }; }

/* ---- login gate ---- */
function showLogin() {
  const l = document.getElementById('login'); if (l) { l.classList.remove('hidden'); l.classList.add('flex'); }
  if (window.lucide) lucide.createIcons();
}
function hideLogin() { const l = document.getElementById('login'); if (l) { l.classList.add('hidden'); l.classList.remove('flex'); } }
async function doLogin(ev) {
  if (ev) ev.preventDefault();
  const username = (document.getElementById('login-user').value || '').trim();
  const password = document.getElementById('login-pass').value || '';
  const errEl = document.getElementById('login-error'); const btn = document.getElementById('login-btn');
  if (errEl) { errEl.classList.add('hidden'); errEl.textContent = ''; }
  if (!username || !password) { if (errEl) { errEl.textContent = 'Enter your username and password.'; errEl.classList.remove('hidden'); } return false; }
  if (btn) { btn.disabled = true; btn.textContent = 'Signing in…'; }
  try {
    const r = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || 'Sign-in failed');
    setToken(data.token); setAccount(data.account || null);
    hideLogin();
    await loadBootstrap(); render();
  } catch (e) {
    if (errEl) { errEl.textContent = e.message || 'Sign-in failed'; errEl.classList.remove('hidden'); }
  }
  if (btn) { btn.disabled = false; btn.textContent = 'Sign in'; }
  return false;
}
function logout() { setToken(null); setAccount(null); state.userMenuOpen = false; document.getElementById('app').innerHTML = ''; showLogin(); }

/* ---- bootstrap ---- */
document.addEventListener('DOMContentLoaded', async () => {
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeSlide(); closeModal(); } });
  if (!getToken()) { showLogin(); return; }
  try { await loadBootstrap(); render(); }
  catch (e) {
    // api() handles 401 by showing the login screen; other errors surface here.
    if (getToken()) document.getElementById('app').innerHTML = '<div class="m-auto max-w-md text-center"><div class="text-lg font-semibold text-red-600">Could not reach the server</div><div class="mt-2 text-sm text-sub">' + e.message + '</div><div class="mt-2 text-sm text-sub">Check your connection, then reload.</div></div>';
  }
  // Register the service worker for offline shell + installability.
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(() => {}); }
});
</script>
