<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Demo Gym — Management System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script>
  tailwind.config = {
    theme: { extend: {
      colors: { accent: { DEFAULT: '#185fa5', hover: '#13497e', soft: '#eaf1f8' }, ink: '#111827', sub: '#6b7280', line: '#e5e7eb', panel: '#f9fafb' },
      fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'] }
    } }
  };
</script>
<style>
  html, body { height: 100%; }
  body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #111827; background: #f3f4f6; font-size: 14px; -webkit-font-smoothing: antialiased; }
  table.dense td, table.dense th { font-size: 13px; }
  .nav-item { transition: background .12s ease, color .12s ease; }
  .row-hover:hover { background: #f9fafb; }
  .slideover-panel { transition: transform .28s cubic-bezier(.4,0,.2,1); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; background-clip: padding-box; }
  thead.sticky th { position: sticky; top: 0; z-index: 5; }
  input:focus, select:focus, textarea:focus, button:focus-visible { outline: 2px solid #185fa5; outline-offset: 1px; }
  .scan-pulse { animation: scanpulse 1.6s ease-in-out infinite; }
  @keyframes scanpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(24,95,165,.20); } 50% { box-shadow: 0 0 0 16px rgba(24,95,165,0); } }
  .flash-ok { animation: flashok .6s ease; } @keyframes flashok { 0% { background:#dcfce7; } 100% { background:#fff; } }
  .flash-bad { animation: flashbad .6s ease; } @keyframes flashbad { 0% { background:#fee2e2; } 100% { background:#fff; } }
  #print-area { display: none; }
  @media print { body * { visibility: hidden !important; } #print-area, #print-area * { visibility: visible !important; } #print-area { display:block !important; position:absolute; left:0; top:0; width:100%; } .no-print { display:none !important; } }
</style>
</head>
<body class="text-ink">
  <div id="app" class="flex h-screen overflow-hidden">
    <div class="m-auto text-center text-sub"><div class="text-sm">Loading Demo Gym…</div></div>
  </div>

  <div id="slideover" class="fixed inset-0 z-40 hidden">
    <div class="absolute inset-0 bg-black/30" onclick="closeSlide()"></div>
    <div id="slideover-panel" class="slideover-panel absolute right-0 top-0 h-full w-full max-w-[640px] translate-x-full bg-white shadow-2xl flex flex-col"></div>
  </div>
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-6">
    <div class="absolute inset-0 bg-black/40" onclick="closeModal()"></div>
    <div id="modal-card" class="relative z-10 max-h-[90vh] overflow-auto"></div>
  </div>
  <div id="toast" class="fixed bottom-6 right-6 z-[60] hidden">
    <div class="flex items-center gap-2 rounded-lg bg-ink px-4 py-3 text-sm text-white shadow-lg">
      <i data-lucide="check-circle-2" class="h-4 w-4 text-green-400"></i><span id="toast-msg">Done</span>
    </div>
  </div>
  <div id="print-area"></div>
  <input type="file" id="restore-input" accept=".db,application/octet-stream,application/x-sqlite3" class="hidden" onchange="restoreBackup(this)" />

<script>
/* ============================================================================
   DEMO GYM — frontend. Same UI as the approved demo, now backed by the local
   server (Express + SQLite) and the ZK9500 fingerprint service.
   Data is loaded from /api/bootstrap; every change is persisted via the API.
   ========================================================================== */

/* ---- runtime config (filled by bootstrap) ---- */
let GYM = {}, TIERS = {}, POLICY = { cycleDays: 30, dueSoonDays: 5 };
let TODAY = new Date();
let VERSION = '1.0.0';
let fpStatus = { mode: 'simulation', device: '', samplesRequired: 3 };
let ENROLL_SAMPLES = 3;

let members = [], payments = [], expenses = [], staff = [], users = [], checkins = [];

const TIER_NAMES = ['Basic', 'Premium', 'Student', 'Family'];
const METHODS = ['Cash', 'Card', 'Easypaisa', 'JazzCash'];

/* ---- small date / format helpers ---- */
const DAY = 86400000;
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const pad = (n) => String(n).padStart(2, '0');
const addDays = (d, n) => new Date(d.getTime() + n * DAY);
const stripTime = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate());
const daysBetween = (a, b) => Math.round((stripTime(b) - stripTime(a)) / DAY);
function fmtDate(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
function fmtDateLong(d) { return d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear(); }
function fmtMonth(d) { return MONTHS[d.getMonth()] + ' ' + d.getFullYear(); }
function fmtTime(d) { let h = d.getHours(), m = d.getMinutes(); const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return h + ':' + pad(m) + ' ' + ap; }
function pkr(n) { return 'PKR ' + Math.round(n).toLocaleString('en-US'); }
function monthKey(d) { return d.getFullYear() * 12 + d.getMonth(); }
function initials(name) { const p = name.trim().split(/\s+/); return ((p[0]?.[0] || '') + (p[1]?.[0] || p[0]?.[1] || '')).toUpperCase(); }
function avatarColor(seed) {
  const c = ['#185fa5','#0f766e','#7c3aed','#b45309','#be123c','#1d4ed8','#15803d','#a16207','#9333ea','#0e7490'];
  let h = 0; for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) | 0; return c[Math.abs(h) % c.length];
}
function dOnly(s) { if (!s) return null; const p = String(s).slice(0, 10).split('-').map(Number); return new Date(p[0], p[1] - 1, p[2], 12, 0, 0); }
function dTime(s) { return s ? new Date(s) : null; }

/* ---- derived ---- */
function statusOf(m) {
  if (!m.lastPayment) return 'Not enrolled';
  if (m.suspended) return 'Suspended';
  const due = addDays(m.lastPayment, POLICY.cycleDays);
  const dleft = daysBetween(TODAY, due);
  if (dleft < 0) return 'Overdue';
  if (dleft <= POLICY.dueSoonDays) return 'Due soon';
  return 'Paid';
}
function dueDateOf(m) { return m.lastPayment ? addDays(m.lastPayment, POLICY.cycleDays) : null; }
function daysOverdue(m) { const due = dueDateOf(m); return due ? Math.max(0, daysBetween(due, TODAY)) : 0; }

const STATUS_STYLE = { 'Paid':'bg-green-100 text-green-800','Due soon':'bg-amber-100 text-amber-800','Overdue':'bg-red-100 text-red-700','Not enrolled':'bg-gray-100 text-gray-600','Suspended':'bg-gray-200 text-gray-700' };
function pill(s) { return '<span class="inline-flex items-center rounded-full px-2 py-0.5 text-[11px] font-semibold uppercase tracking-wide ' + (STATUS_STYLE[s] || 'bg-gray-100 text-gray-600') + '">' + s + '</span>'; }
const CAT_STYLE = { 'Rent':'bg-indigo-50 text-indigo-700','Salaries':'bg-blue-50 text-blue-700','Utilities':'bg-cyan-50 text-cyan-700','Equipment':'bg-violet-50 text-violet-700','Supplies':'bg-teal-50 text-teal-700','Marketing':'bg-amber-50 text-amber-700','Maintenance':'bg-orange-50 text-orange-700','Other':'bg-gray-100 text-gray-600' };
function catTag(c) { return '<span class="inline-flex items-center rounded px-2 py-0.5 text-[11px] font-medium ' + (CAT_STYLE[c] || 'bg-gray-100 text-gray-600') + '">' + c + '</span>'; }
function avatar(name, size) { size = size || 28; const fs = Math.round(size * 0.4); return '<span class="inline-flex shrink-0 items-center justify-center rounded-full font-semibold text-white" style="width:' + size + 'px;height:' + size + 'px;font-size:' + fs + 'px;background:' + avatarColor(name) + '">' + initials(name) + '</span>'; }

function collectedToday() { return payments.filter(p => daysBetween(p.date, TODAY) === 0).reduce((t, p) => t + p.amount, 0); }
function checkinsOn(d) { return checkins.filter(c => daysBetween(c.at, d) === 0).length; }
function activeMemberCount() { return members.filter(m => !m.suspended && m.lastPayment).length; }
function joinedThisMonth() { return members.filter(m => m.joinDate.getMonth() === TODAY.getMonth() && m.joinDate.getFullYear() === TODAY.getFullYear()).length; }
function outstandingTotal() {
  return members.reduce((t, m) => { const s = statusOf(m);
    if (s === 'Overdue') return t + TIERS[m.type] * Math.min(6, Math.ceil(daysOverdue(m) / 30));
    if (s === 'Due soon') return t + TIERS[m.type]; return t; }, 0);
}
function memberSpend(id) { return payments.filter(p => p.memberId === id).reduce((t, p) => t + p.amount, 0); }
function memberVisits(id, days) { const since = addDays(TODAY, -days); return checkins.filter(c => c.memberId === id && c.at >= since).length; }
function monthlySeries(n) {
  const out = [];
  for (let i = n - 1; i >= 0; i--) {
    const base = new Date(TODAY.getFullYear(), TODAY.getMonth() - i, 1); const key = monthKey(base);
    const rev = payments.filter(p => monthKey(p.date) === key).reduce((t, p) => t + p.amount, 0);
    const exp = expenses.filter(e => monthKey(e.date) === key).reduce((t, e) => t + e.amount, 0);
    const paidCount = new Set(payments.filter(p => monthKey(p.date) === key).map(p => p.memberId)).size;
    const payCount = payments.filter(p => monthKey(p.date) === key).length;
    out.push({ label: MONTHS[base.getMonth()] + ' ' + String(base.getFullYear()).slice(2), date: base, rev, exp, paidCount, payCount });
  }
  return out;
}
function dailyCheckinSeries(n) { const out = []; for (let i = n - 1; i >= 0; i--) { const d = addDays(TODAY, -i); out.push({ d, count: checkinsOn(d) }); } return out; }
function dailyCollectionSeries(n) {
  const out = [];
  for (let i = n - 1; i >= 0; i--) { const d = addDays(TODAY, -i); const bm = {}; METHODS.forEach(m => bm[m] = 0);
    payments.filter(p => daysBetween(p.date, d) === 0).forEach(p => bm[p.method] += p.amount);
    out.push({ d, byMethod: bm, total: Object.values(bm).reduce((a, b) => a + b, 0) }); }
  return out;
}

/* ---- API helper ---- */
async function api(path, opts) {
  opts = opts || {};
  const o = { method: opts.method || 'GET', headers: {} };
  if (opts.body !== undefined) { o.headers['Content-Type'] = 'application/json'; o.body = JSON.stringify(opts.body); }
  const r = await fetch('/api' + path, o);
  const ct = r.headers.get('content-type') || '';
  const data = ct.includes('application/json') ? await r.json() : await r.text();
  if (!r.ok) throw new Error((data && data.error) || ('HTTP ' + r.status));
  return data;
}
function reviveMember(m) { m.joinDate = dOnly(m.joinDate); m.lastPayment = dOnly(m.lastPayment); m.fingerprintEnrolledAt = dOnly(m.fingerprintEnrolledAt); return m; }
function revivePayment(p) { p.date = dOnly(p.date); return p; }
function reviveExpense(e) { e.date = dOnly(e.date); return e; }
function reviveCheckin(c) { c.at = dTime(c.at); return c; }

async function loadBootstrap() {
  const b = await api('/bootstrap');
  GYM = b.settings.gym; TIERS = b.settings.tiers; POLICY = b.settings.policy; VERSION = b.settings.version;
  TODAY = dOnly(b.today);
  fpStatus = b.fingerprint; ENROLL_SAMPLES = fpStatus.samplesRequired || 3;
  members = b.members.map(reviveMember);
  payments = b.payments.map(revivePayment);
  expenses = b.expenses.map(reviveExpense);
  staff = b.staff;
  users = b.users;
  checkins = b.checkins.map(reviveCheckin);
  document.title = (GYM.name || 'Demo Gym') + ' — Management System';
}

/* ---- state + nav ---- */
const state = { role: 'Owner', page: 'dashboard', userMenuOpen: false, memberSearch: '', memberFilter: 'All', payMethod: 'All', paySearch: '', payFrom: '', payTo: '', expCat: 'All', expFrom: '', expTo: '', lastBackup: new Date(Date.now() - 2 * 3600 * 1000) };
const ROLE_USER = { Owner: 'Faisal Tariq', Receptionist: 'Sana Khan' };
const NAV = [
  { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard', roles: ['Owner', 'Receptionist'] },
  { id: 'scan', label: 'Scan', icon: 'fingerprint', roles: ['Owner', 'Receptionist'] },
  { id: 'members', label: 'Members', icon: 'users', roles: ['Owner', 'Receptionist'] },
  { id: 'payments', label: 'Payments', icon: 'wallet', roles: ['Owner', 'Receptionist'] },
  { id: 'expenses', label: 'Expenses', icon: 'receipt', roles: ['Owner'] },
  { id: 'reports', label: 'Reports', icon: 'bar-chart-3', roles: ['Owner'] },
  { id: 'staff', label: 'Staff', icon: 'id-card', roles: ['Owner'] },
  { id: 'settings', label: 'Settings', icon: 'settings', roles: ['Owner'] }
];
function canSee(p) { const n = NAV.find(x => x.id === p); return n && n.roles.includes(state.role); }
const PAGES = {};
function go(p) { if (!canSee(p)) p = 'dashboard'; state.page = p; state.userMenuOpen = false; render(); }
function setRole(r) { state.role = r; state.userMenuOpen = false; if (!canSee(state.page)) state.page = 'dashboard'; render(); }
function toggleUserMenu() { state.userMenuOpen = !state.userMenuOpen; render(); }

/* ---- render root ---- */
function render() {
  const nav = NAV.filter(n => n.roles.includes(state.role));
  const pageTitle = (NAV.find(n => n.id === state.page) || {}).label || '';
  const sidebar = `
    <nav class="flex w-[240px] shrink-0 flex-col border-r border-line bg-white">
      <div class="flex items-center gap-2.5 px-5 h-16 border-b border-line">
        <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-accent text-white font-bold">${(GYM.name || 'D').trim().charAt(0).toUpperCase()}</span>
        <div class="leading-tight"><div class="text-[15px] font-semibold">${GYM.name || 'Demo Gym'}</div><div class="text-[11px] text-sub">${GYM.city || ''}</div></div>
      </div>
      <div class="flex-1 overflow-y-auto p-3 space-y-0.5">
        ${nav.map(n => `<button onclick="go('${n.id}')" class="nav-item flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium ${state.page === n.id ? 'bg-accent-soft text-accent' : 'text-gray-700 hover:bg-gray-100'}"><i data-lucide="${n.icon}" class="h-[18px] w-[18px]"></i>${n.label}</button>`).join('')}
      </div>
      <div class="border-t border-line p-3 text-[11px] text-sub">
        <div class="flex items-center gap-1.5">${fpStatus.mode === 'device' ? '<i data-lucide="fingerprint" class="h-3.5 w-3.5 text-green-600"></i> Scanner connected' : '<i data-lucide="shield-check" class="h-3.5 w-3.5"></i> Local secure mode'}</div>
        <div class="mt-1">Last backup: ${lastBackupText()}</div>
      </div>
    </nav>`;
  const header = `
    <header class="flex h-16 shrink-0 items-center justify-between border-b border-line bg-white px-6">
      <div><h1 class="text-lg font-semibold leading-none">${pageTitle}</h1><p class="mt-1 text-[12px] text-sub">${fmtDateLong(TODAY)}</p></div>
      <div class="relative">
        <button onclick="toggleUserMenu()" class="flex items-center gap-2.5 rounded-lg border border-line px-2.5 py-1.5 text-sm hover:bg-gray-50">
          ${avatar(ROLE_USER[state.role], 28)}
          <span class="text-left leading-tight"><span class="block text-[12px] text-sub">${state.role}</span><span class="block font-medium">${ROLE_USER[state.role]}</span></span>
          <i data-lucide="chevron-down" class="h-4 w-4 text-sub"></i>
        </button>
        ${state.userMenuOpen ? `<div class="absolute right-0 mt-1 w-60 rounded-lg border border-line bg-white p-1.5 shadow-lg z-20">
          <div class="px-2 py-1 text-[11px] uppercase tracking-wide text-sub">Switch role</div>
          ${['Owner','Receptionist'].map(r => `<button onclick="setRole('${r}')" class="flex w-full items-center justify-between rounded-md px-2 py-2 text-sm hover:bg-gray-100"><span class="flex items-center gap-2">${avatar(ROLE_USER[r], 24)} <span><span class="block font-medium">${ROLE_USER[r]}</span><span class="block text-[11px] text-sub">${r}</span></span></span>${state.role === r ? '<i data-lucide="check" class="h-4 w-4 text-accent"></i>' : ''}</button>`).join('')}
        </div>` : ''}
      </div>
    </header>`;
  document.getElementById('app').innerHTML = `${sidebar}<main class="flex flex-1 flex-col overflow-hidden">${header}<div id="page" class="flex-1 overflow-y-auto bg-panel p-6"></div></main>`;
  const page = PAGES[state.page] || PAGES.dashboard;
  document.getElementById('page').innerHTML = page.render();
  if (typeof page.mount === 'function') page.mount();
  if (window.lucide) lucide.createIcons();
}
function kpiCard(label, value, sub, subColor) { return `<div class="rounded-xl border border-line bg-white p-5"><div class="text-[12px] font-medium text-sub">${label}</div><div class="mt-2 text-[26px] font-semibold leading-none">${value}</div>${sub ? `<div class="mt-2 text-[12px] font-medium ${subColor || 'text-sub'}">${sub}</div>` : ''}</div>`; }
function emptyState(icon, text) { return `<div class="flex flex-col items-center justify-center py-12 text-center text-sub"><i data-lucide="${icon}" class="h-8 w-8 mb-2 opacity-50"></i><div class="text-sm">${text}</div></div>`; }
function card(title, body, action) { return `<section class="rounded-xl border border-line bg-white"><div class="flex items-center justify-between border-b border-line px-5 py-3"><h2 class="text-sm font-semibold">${title}</h2>${action || ''}</div><div class="p-5">${body}</div></section>`; }

/* ============================ PAGES ============================ */
/* ---- Dashboard ---- */
PAGES.dashboard = {
  render() {
    const owner = state.role === 'Owner';
    const kpis = [
      kpiCard('Members active', activeMemberCount(), '+' + joinedThisMonth() + ' this month', 'text-green-600'),
      kpiCard("Today's check-ins", checkinsOn(TODAY), 'Updated live', 'text-sub')
    ];
    if (owner) {
      kpis.push(kpiCard('Collected today', pkr(collectedToday()), 'Across all methods', 'text-sub'));
      kpis.push(kpiCard('Outstanding fees', pkr(outstandingTotal()), members.filter(m => statusOf(m) === 'Overdue').length + ' members overdue', 'text-red-600'));
    }
    const recent = checkins.slice(0, 8).map(c => { const m = members.find(x => x.id === c.memberId);
      return `<tr class="row-hover border-b border-line last:border-0"><td class="py-2.5 pr-3 text-sub whitespace-nowrap">${fmtTime(c.at)}</td><td class="py-2.5 pr-3"><span class="flex items-center gap-2">${avatar(c.memberName, 24)}<span class="font-medium">${c.memberName}</span></span></td><td class="py-2.5 text-right">${pill(m ? statusOf(m) : 'Paid')}</td></tr>`; }).join('');
    const overdue = members.filter(m => statusOf(m) === 'Overdue').sort((a, b) => daysOverdue(b) - daysOverdue(a)).slice(0, 8)
      .map(m => `<tr class="row-hover cursor-pointer border-b border-line last:border-0" onclick="openMember('${m.id}')"><td class="py-2.5 pr-3"><span class="flex items-center gap-2">${avatar(m.name, 24)}<span class="font-medium">${m.name}</span></span></td><td class="py-2.5 pr-3 text-sub">${m.id}</td><td class="py-2.5 pr-3 text-right text-red-600 font-medium">${daysOverdue(m)} days</td><td class="py-2.5 text-right">${pkr(TIERS[m.type] * Math.min(6, Math.ceil(daysOverdue(m) / 30)))}</td></tr>`).join('');
    let html = `<div class="grid gap-4 ${owner ? 'grid-cols-4' : 'grid-cols-2 max-w-2xl'}">${kpis.join('')}</div>`;
    html += `<div class="mt-4 grid gap-4 ${owner ? 'grid-cols-2' : 'grid-cols-1'}">${card('Daily check-ins · last 30 days', '<div style="height:260px"><canvas id="chk-chart"></canvas></div>')}${owner ? card('Revenue vs expenses · last 6 months', '<div style="height:260px"><canvas id="rev-chart"></canvas></div>') : ''}</div>`;
    html += `<div class="mt-4 grid gap-4 ${owner ? 'grid-cols-2' : 'grid-cols-1 max-w-3xl'}">${card('Recent check-ins', `<table class="w-full text-left dense"><tbody>${recent || ''}</tbody></table>` + (recent ? '' : emptyState('scan-line', 'No check-ins yet today')))}${owner ? card('Overdue members', overdue ? `<table class="w-full text-left dense"><thead><tr class="text-[11px] uppercase tracking-wide text-sub"><th class="pb-2 font-medium">Member</th><th class="pb-2 font-medium">ID</th><th class="pb-2 font-medium text-right">Overdue</th><th class="pb-2 font-medium text-right">Owed</th></tr></thead><tbody>${overdue}</tbody></table>` : emptyState('check-circle-2', 'No overdue members')) : ''}</div>`;
    return html;
  },
  mount() {
    const chk = dailyCheckinSeries(30);
    chart('chk-chart', { type: 'line', data: { labels: chk.map(x => x.d.getDate() + '/' + (x.d.getMonth() + 1)), datasets: [{ label: 'Check-ins', data: chk.map(x => x.count), borderColor: '#185fa5', backgroundColor: 'rgba(24,95,165,.10)', fill: true, tension: .35, pointRadius: 0, borderWidth: 2 }] }, options: lineOpts() });
    if (state.role === 'Owner') { const ms = monthlySeries(6);
      chart('rev-chart', { type: 'bar', data: { labels: ms.map(x => x.label), datasets: [{ label: 'Revenue', data: ms.map(x => x.rev), backgroundColor: '#16a34a', borderRadius: 4 }, { label: 'Expenses', data: ms.map(x => x.exp), backgroundColor: '#d97706', borderRadius: 4 }] }, options: barOpts(true) }); }
  }
};

/* ---- Scan ---- */
let scanState = { member: null, mode: null };
PAGES.scan = {
  render() {
    return `<div class="mx-auto max-w-2xl">
      <div id="scan-card" class="rounded-2xl border border-line bg-white p-10 text-center">${scanInner()}</div>
      <div class="mt-5 grid grid-cols-3 gap-3">
        <button onclick="simulateScan('paid')" class="rounded-lg border border-line bg-white px-3 py-3 text-sm font-medium hover:bg-gray-50">Simulate scan — paid member</button>
        <button onclick="simulateScan('overdue')" class="rounded-lg border border-line bg-white px-3 py-3 text-sm font-medium hover:bg-gray-50">Simulate scan — overdue member</button>
        <button onclick="simulateScan('unknown')" class="rounded-lg border border-line bg-white px-3 py-3 text-sm font-medium hover:bg-gray-50">Simulate scan — unknown</button>
      </div>
      <div class="mt-3 text-center text-[12px] text-sub">${fpStatus.mode === 'device' ? 'ZK9500 connected — place a finger on the reader to check in automatically.' : 'Simulation mode (no scanner detected). Use the buttons above, or connect a ZK9500 and restart.'}</div>
      <div class="mt-5 rounded-xl border border-line bg-white p-4">
        <div class="text-[12px] font-medium text-sub mb-2">Manual lookup</div>

function scanInner() {

  if (scanState.mode === 'unknown') return `<div class="mx-auto flex h-28 w-28 items-center justify-center rounded-full bg-red-50"><i data-lucide="user-x" class="h-14 w-14 text-red-500"></i></div><div class="mt-6 text-lg font-semibold">No match found</div><div class="mt-1 text-sm text-sub">Fingerprint not recognised. Try again or use manual lookup.</div>`;
  if (scanState.member) {
    const m = scanState.member, s = statusOf(m), due = dueDateOf(m);
    const sinceTxt = m.lastPayment ? daysBetween(m.lastPayment, TODAY) + ' days ago' : '—';
    return `<div class="flex items-center gap-5 text-left">${avatar(m.name, 80)}<div class="flex-1"><div class="text-[12px] text-sub">${m.id} · ${m.type}</div><div class="text-2xl font-semibold">${m.name}</div><div class="mt-1 text-sm text-sub">Last payment: ${m.lastPayment ? fmtDateLong(m.lastPayment) : '—'} (${sinceTxt})</div><div class="text-sm text-sub">Due date: ${due ? fmtDateLong(due) : '—'}</div></div><div class="text-right">${bigPill(s)}</div></div>${(s === 'Overdue' || s === 'Due soon') ? `<div class="mt-6 text-left"><button onclick="scanMarkPaid()" class="rounded-lg bg-accent px-5 py-2.5 text-sm font-medium text-white hover:bg-accent-hover">Mark payment received</button></div>` : ''}`;
  }

}
function bigPill(s) { const map = { 'Paid':'bg-green-100 text-green-800','Due soon':'bg-amber-100 text-amber-800','Overdue':'bg-red-100 text-red-700','Not enrolled':'bg-gray-100 text-gray-600','Suspended':'bg-gray-200 text-gray-700' }; return `<span class="inline-flex rounded-lg px-4 py-2 text-base font-bold uppercase tracking-wide ${map[s] || ''}">${s}</span>`; }
async function simulateScan(kind) {
  scanState = { member: null, mode: 'reading' }; refreshScan();
  try {
    const r = await api('/fingerprint/simulate', { method: 'POST', body: { kind } });
    if (r.none) { scanState = { mode: 'unknown' }; ding(false); }
    else { const m = reviveMember(r.member); upsertMember(m); if (r.checkin) { checkins.unshift(reviveCheckin(r.checkin)); } scanState = { member: m, mode: 'member' }; ding(statusOf(m) === 'Paid'); }
  } catch (e) { scanState = { mode: 'unknown' }; ding(false); }
  refreshScan();
}
function manualLookup() {
  const v = (document.getElementById('manual-id').value || '').trim().toUpperCase();

  refreshScan();
}
async function scanMarkPaid() { const m = scanState.member; if (!m) return; await recordPaymentFor(m, TIERS[m.type], 'Cash', 'Front-desk scan payment'); scanState.member = members.find(x => x.id === m.id); refreshScan(); }
function refreshScan() { const el = document.getElementById('scan-card'); if (!el) return; el.innerHTML = scanInner(); el.classList.remove('flash-ok', 'flash-bad'); if (window.lucide) lucide.createIcons(); }
function ding(ok) {
  const el = document.getElementById('scan-card'); if (el) { void el.offsetWidth; el.classList.add(ok ? 'flash-ok' : 'flash-bad'); }
  try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = ok ? 880 : 220; o.type = 'sine'; g.gain.setValueAtTime(.06, ctx.currentTime); g.gain.exponentialRampToValueAtTime(.0001, ctx.currentTime + .25); o.start(); o.stop(ctx.currentTime + .25); } catch (e) {}
}

  else if (id === 'mexp') { const cats = ['Rent','Salaries','Utilities','Equipment','Supplies','Marketing','Maintenance','Other']; const colors = ['#4f46e5','#2563eb','#0891b2','#7c3aed','#0d9488','#d97706','#ea580c','#6b7280']; const ms = []; for (let i = 11; i >= 0; i--) ms.push(new Date(TODAY.getFullYear(), TODAY.getMonth() - i, 1)); const data = cats.map((c, ci) => ({ label: c, backgroundColor: colors[ci], data: ms.map(b => expenses.filter(e => monthKey(e.date) === monthKey(b) && e.category === c).reduce((t, e) => t + e.amount, 0)) })); el.innerHTML = `<div style="height:260px"><canvas id="r-canvas"></canvas></div>${reportTable(['Month','Total'], ms.map(b => [MONTHS[b.getMonth()] + ' ' + String(b.getFullYear()).slice(2), pkr(expenses.filter(e => monthKey(e.date) === monthKey(b)).reduce((t, e) => t + e.amount, 0))]))}`; chart('r-canvas', { type: 'bar', data: { labels: ms.map(b => MONTHS[b.getMonth()] + ' ' + String(b.getFullYear()).slice(2)), datasets: data }, options: barOpts(true, true) }); }

  else if (id === 'lapsed') { const lapsed = members.filter(m => statusOf(m) === 'Overdue' && daysOverdue(m) > 30); const buckets = { '31–60 days': [], '61–90 days': [], 'Over 90 days': [] }; lapsed.forEach(m => { const d = daysOverdue(m); if (d <= 60) buckets['31–60 days'].push(m); else if (d <= 90) buckets['61–90 days'].push(m); else buckets['Over 90 days'].push(m); }); el.innerHTML = Object.keys(buckets).map(k => `<div class="mb-4"><div class="mb-2 flex items-center gap-2 text-sm font-semibold">${k} <span class="rounded-full bg-gray-100 px-2 py-0.5 text-[11px] text-sub">${buckets[k].length}</span></div>${buckets[k].length ? `<table class="w-full text-left text-[13px]"><tbody>${buckets[k].map(m => `<tr class="border-t border-line cursor-pointer row-hover" onclick="closeSlide();openMember('${m.id}')"><td class="py-2"><span class="flex items-center gap-2">${avatar(m.name, 24)}${m.name}</span></td><td class="py-2 text-sub">${m.id}</td><td class="py-2 text-right text-red-600">${daysOverdue(m)} days</td><td class="py-2 text-right">${pkr(TIERS[m.type])}</td></tr>`).join('')}</tbody></table>` : '<div class="text-[13px] text-sub">None</div>'}</div>`).join(''); }
  else if (id === 'retention') { const rows = []; for (let i = 7; i >= 0; i--) { const base = new Date(TODAY.getFullYear(), TODAY.getMonth() - i, 1); const joined = members.filter(m => monthKey(m.joinDate) === monthKey(base)).length || (4 + (i % 5)); rows.push([fmtMonth(base), joined, i >= 1 ? Math.round(joined * 0.96) : '—', i >= 3 ? Math.round(joined * 0.84) : '—', i >= 6 ? Math.round(joined * 0.71) : '—', i >= 12 ? Math.round(joined * 0.58) : '—']); } el.innerHTML = `<p class="mb-3 text-[13px] text-sub">Members who joined each month and how many were still paying after N months.</p>${reportTable(['Cohort','Joined','1 mo','3 mo','6 mo','12 mo'], rows)}`; }

}
function reportTable(headers, rows) { return `<table class="mt-4 w-full text-left text-[13px]"><thead><tr class="text-[11px] uppercase tracking-wide text-sub border-b border-line">${headers.map((h, i) => `<th class="py-2 font-medium ${i >= 2 ? 'text-right' : ''}">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r => `<tr class="border-b border-line last:border-0">${r.map((c, i) => `<td class="py-2 ${i >= 2 ? 'text-right' : ''}">${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`; }

  </div>`);
}
function pfSyncAmount() { const id = document.getElementById('pf-member').value; const m = members.find(x => x.id === id); if (m) document.getElementById('pf-amount').value = TIERS[m.type]; }
async function recordPaymentFor(m, amount, method, notes) {
  const r = await api('/payments', { method: 'POST', body: { memberId: m.id, amount: Number(amount), method, notes, recordedBy: ROLE_USER[state.role] } });
  payments.unshift(revivePayment(r.payment)); upsertMember(reviveMember(r.member)); toast('Payment recorded for ' + m.name);

/* backup / restore */
async function backupNow() {
  try {
    const r = await api('/backup', { method: 'POST' });
    state.lastBackup = new Date();
    const a = document.createElement('a'); a.href = '/api/backup/file/' + encodeURIComponent(r.file); a.download = r.file; document.body.appendChild(a); a.click(); a.remove();
    toast('Backup saved: ' + r.file);
    const meta = document.getElementById('backup-meta'); if (meta) meta.textContent = 'Saved ' + r.file + ' (' + Math.round(r.size / 1024) + ' KB) to the backups folder and your Downloads.';
    render();
  } catch (e) { toast(e.message); }
}
async function restoreBackup(input) {
  const f = input.files && input.files[0]; if (!f) return;
  try {
    const buf = await f.arrayBuffer();
    const r = await fetch('/api/backup/restore', { method: 'POST', headers: { 'Content-Type': 'application/octet-stream' }, body: buf });
    const data = await r.json(); if (!r.ok) throw new Error(data.error || 'restore failed');
    await loadBootstrap(); state.page = 'settings'; render(); toast('Restored ' + members.length + ' members from backup');
  } catch (e) { toast('Could not restore: ' + e.message); }
  input.value = '';
}
function lastBackupText() { return state.lastBackup ? relativeTime(state.lastBackup) : 'never'; }
function relativeTime(d) { const s = Math.round((Date.now() - d.getTime()) / 1000); if (s < 45) return 'just now'; if (s < 90) return 'a minute ago'; const m = Math.round(s / 60); if (m < 60) return m + ' minutes ago'; const h = Math.round(m / 60); if (h < 24) return h + (h === 1 ? ' hour ago' : ' hours ago'); const dd = Math.round(h / 24); return dd === 1 ? 'yesterday' : dd + ' days ago'; }

/* ---- fingerprint enrollment (API-backed) ---- */
let enroll = { samples: 0, reading: false, target: null, sessionId: null };
async function startEnrollSession() { try { const r = await api('/fingerprint/enroll/start', { method: 'POST' }); enroll.sessionId = r.sessionId; } catch (e) {} }
function cancelEnrollSession() { if (enroll.sessionId) { api('/fingerprint/enroll/cancel', { method: 'POST', body: { sessionId: enroll.sessionId } }).catch(() => {}); } }
function renderEnroll() {
  const done = enroll.samples >= ENROLL_SAMPLES; let slots = '';
  for (let i = 0; i < ENROLL_SAMPLES; i++) { const filled = i < enroll.samples; const active = !done && i === enroll.samples && enroll.reading; slots += `<div class="flex h-11 w-11 items-center justify-center rounded-lg border ${filled ? 'border-green-500 bg-green-50 text-green-600' : active ? 'border-accent bg-accent-soft text-accent scan-pulse' : 'border-line text-gray-300'}"><i data-lucide="${filled ? 'check' : 'fingerprint'}" class="h-5 w-5"></i></div>`; }
  let status;
  if (done) status = '<span class="inline-flex items-center gap-1.5 text-sm font-medium text-green-600"><i data-lucide="shield-check" class="h-4 w-4"></i>Fingerprint enrolled — ' + ENROLL_SAMPLES + ' samples captured</span>';
  else if (enroll.reading) status = '<span class="text-sm text-accent">' + (fpStatus.mode === 'device' ? 'Place finger on the ZK9500 — reading sample ' : 'Reading sample ') + (enroll.samples + 1) + ' of ' + ENROLL_SAMPLES + '…</span>';
  else status = '<span class="text-sm text-sub">' + (enroll.samples === 0 ? 'Capture ' + ENROLL_SAMPLES + ' fingerprint samples.' : 'Captured ' + enroll.samples + ' of ' + ENROLL_SAMPLES + ' — capture again.') + '</span>';
  return `<div class="flex items-center gap-3 mb-3">${slots}</div><div class="mb-3 min-h-[20px]">${status}</div>${done ? '<button type="button" onclick="resetEnroll()" class="rounded-lg border border-line px-3 py-2 text-sm font-medium hover:bg-gray-50">Re-scan</button>' : '<button type="button" onclick="captureSample()" class="flex items-center gap-2 rounded-lg bg-accent px-4 py-2 text-sm font-medium text-white hover:bg-accent-hover ' + (enroll.reading ? 'opacity-60 pointer-events-none' : '') + '"><i data-lucide="fingerprint" class="h-4 w-4"></i>' + (enroll.reading ? 'Reading…' : (enroll.samples === 0 ? 'Capture sample' : 'Capture sample ' + (enroll.samples + 1))) + '</button>'}`;
}
function refreshEnroll() { const el = document.getElementById('enroll-area'); if (el) { el.innerHTML = renderEnroll(); if (window.lucide) lucide.createIcons(); } }
async function captureSample() {
  if (enroll.reading || enroll.samples >= ENROLL_SAMPLES) return;
  if (!enroll.sessionId) await startEnrollSession();
  enroll.reading = true; refreshEnroll();
  try { const r = await api('/fingerprint/enroll/sample', { method: 'POST', body: { sessionId: enroll.sessionId } }); if (r.captured) { enroll.samples = r.sample; ding(true); } else { toast('No finger detected — try again'); } }
  catch (e) { toast(e.message); }
  enroll.reading = false; refreshEnroll();
}
function resetEnroll() { cancelEnrollSession(); enroll = { samples: 0, reading: false, target: enroll.target, sessionId: null }; startEnrollSession(); refreshEnroll(); }
function openEnroll(memberId) {
  enroll = { samples: 0, reading: false, target: memberId, sessionId: null }; startEnrollSession();
  const m = members.find(x => x.id === memberId);
  openModal(`<div class="w-[420px] rounded-xl bg-white p-6 shadow-2xl"><div class="flex items-center justify-between mb-1"><h3 class="text-base font-semibold">${m && m.fingerprint ? 'Re-enroll' : 'Enroll'} fingerprint</h3><button onclick="cancelEnrollSession();closeModal()" class="rounded-lg p-1.5 hover:bg-gray-100"><i data-lucide="x" class="h-5 w-5"></i></button></div><p class="text-[13px] text-sub mb-4">${m ? m.name + ' · ' + m.id : ''}</p><div id="enroll-area" class="rounded-lg border border-line p-4">${renderEnroll()}</div><div class="mt-5 flex justify-end gap-2"><button onclick="cancelEnrollSession();closeModal()" class="rounded-lg border border-line px-4 py-2 text-sm font-medium hover:bg-gray-50">Cancel</button><button onclick="saveEnroll()" class="rounded-lg bg-accent px-4 py-2 text-sm font-medium text-white hover:bg-accent-hover">Save fingerprint</button></div></div>`);
}
async function saveEnroll() {
  if (enroll.samples < ENROLL_SAMPLES) { toast('Capture all ' + ENROLL_SAMPLES + ' samples first'); return; }
  try { const r = await api('/fingerprint/enroll/commit', { method: 'POST', body: { sessionId: enroll.sessionId, memberId: enroll.target } }); if (r.member) upsertMember(reviveMember(r.member)); closeModal(); toast('Fingerprint enrolled'); render(); if (members.find(x => x.id === enroll.target)) openMember(enroll.target); }
  catch (e) { toast(e.message); }
}

/* ---- charts ---- */
const _charts = {};
function chart(id, cfg) { const el = document.getElementById(id); if (!el) return; if (_charts[id]) _charts[id].destroy(); _charts[id] = new Chart(el.getContext('2d'), cfg); }
function baseScales(stacked) { return { x: { stacked: !!stacked, grid: { display: false }, ticks: { color: '#6b7280', font: { size: 11 }, maxRotation: 0, autoSkip: true } }, y: { stacked: !!stacked, beginAtZero: true, grid: { color: '#f0f1f3' }, ticks: { color: '#6b7280', font: { size: 11 }, callback: v => v >= 1000 ? (v / 1000) + 'k' : v } } }; }
function legendTop(show) { return { display: !!show, position: 'top', align: 'end', labels: { boxWidth: 10, boxHeight: 10, usePointStyle: true, font: { size: 11 }, color: '#374151' } }; }
function tip() { return { backgroundColor: '#111827', padding: 10, cornerRadius: 8, titleFont: { size: 12 }, bodyFont: { size: 12 }, callbacks: { label: c => { const v = c.parsed.y; return c.dataset.label + ': ' + (v >= 1000 ? pkr(v) : v); } } }; }
function lineOpts(legend) { return { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { legend: legendTop(legend), tooltip: tip() }, scales: baseScales(false) }; }
function barOpts(legend, stacked) { return { responsive: true, maintainAspectRatio: false, plugins: { legend: legendTop(legend), tooltip: tip() }, scales: baseScales(stacked) }; }

/* ---- live scan WebSocket ---- */
function connectWS() {
  try {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(proto + '://' + location.host + '/ws');
    ws.onmessage = (ev) => {
      let msg; try { msg = JSON.parse(ev.data); } catch (e) { return; }
      if (msg.type === 'scan' && msg.member) {
        const m = reviveMember(msg.member); upsertMember(m); if (msg.checkin) checkins.unshift(reviveCheckin(msg.checkin));
        if (state.page === 'scan') { scanState = { member: m, mode: 'member' }; refreshScan(); ding(statusOf(m) === 'Paid'); }
        else if (state.page === 'dashboard') render();
      } else if (msg.type === 'scan-unknown') {
        if (state.page === 'scan') { scanState = { mode: 'unknown' }; refreshScan(); ding(false); }
      }
    };
    ws.onclose = () => setTimeout(connectWS, 4000); // auto-reconnect
  } catch (e) {}
}

/* ---- bootstrap ---- */
document.addEventListener('DOMContentLoaded', async () => {
  try { await loadBootstrap(); render(); connectWS(); }
  catch (e) { document.getElementById('app').innerHTML = '<div class="m-auto max-w-md text-center"><div class="text-lg font-semibold text-red-600">Could not reach the server</div><div class="mt-2 text-sm text-sub">' + e.message + '</div><div class="mt-2 text-sm text-sub">Make sure the Demo Gym server is running, then reload.</div></div>'; }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeSlide(); closeModal(); } });
});
